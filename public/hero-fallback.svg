<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background matching hero overlay -->
  <rect width="1920" height="1080" fill="#0A0C10"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#000000;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#grad1)"/>
  
  <!-- Orange accent glow -->
  <circle cx="1920" cy="0" r="600" fill="#F05A28" opacity="0.1"/>
  
  <!-- Centered brand text as fallback -->
  <text x="960" y="540" font-size="64" font-weight="bold" text-anchor="middle" fill="#F05A28" opacity="0.3" font-family="Arial, sans-serif">
    Razan Aeterna Solusi
  </text>
</svg>
